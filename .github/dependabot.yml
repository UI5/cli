version: 2
updates:
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  commit-message:
    prefix: "ci(github-actions)"
  cooldown:
    default-days: 2
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: weekly
    day: sunday
    time: "10:00"
    timezone: Etc/UCT
  cooldown:
    default-days: 2
  versioning-strategy: increase
  commit-message:
    prefix: "deps"
    prefix-development: "build(deps-dev)"
