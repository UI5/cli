name: Node Packages Engine Compatibility Check

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  engine-compat:
    name: Engine compatibility
    runs-on: ubuntu-24.04
    steps:

    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24.x

    - name: Install dependencies
      run: npm ci

    - name: Check engine compatibility
      id: check
      run: |
        # Run check-engine-light
        # On success: exit 0, no output
        # On failure: exit 1, stderr contains "Error: incompatible dependencies: pkg1, pkg2, ..."
        set +e
        OUTPUT=$(npx -y check-engine-light 2>&1)
        EXIT_CODE=$?
        set -e

        {
          echo "output<<EOF"
          echo "$OUTPUT"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        if [ $EXIT_CODE -eq 0 ]; then
          echo "failed=false" >> "$GITHUB_OUTPUT"
        else
          echo "failed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Build and post PR comment
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CEL_OUTPUT: ${{ steps.check.outputs.output }}
      run: |
        PR="${{ github.event.pull_request.number }}"
        MARKER="<!-- engine-compat -->"
        FAILED="${{ steps.check.outputs.failed }}"

        # Read project engine range from package.json
        PROJECT_RANGE=$(jq -r '.engines.node' package.json)

        # Build the comment body
        if [ "$FAILED" = "true" ]; then ICON="❌"; else ICON="✅"; fi

        {
          echo "$MARKER"
          echo "## $ICON Engine Compatibility"
          echo ""
          echo "**Project engines.node:** \`$PROJECT_RANGE\`"
          echo ""
        } > /tmp/comment.md

        if [ "$FAILED" = "true" ]; then
          # Extract per-package detail lines: "pkg { node: 'range' } incompatible with ..."
          # and the summary line: "Error: incompatible dependencies: pkg1, pkg2, ..."
          {
            echo "| Package | Required Node |"
            echo "|---|---|"
            echo "$CEL_OUTPUT" | grep ' incompatible with ' | while IFS= read -r line; do
              PKG=$(echo "$line" | awk '{print $1}')
              RANGE=$(echo "$line" | grep -oP '\{ node: .?\K[^}'"'"']+' | head -1)
              SAFE_RANGE="${RANGE//|/\\|}"
              echo "| $PKG | $SAFE_RANGE |"
            done
          } >> /tmp/comment.md
        else
          echo "All dependencies are compatible with the project's engine range." >> /tmp/comment.md
        fi

        # Update existing comment (matched by HTML marker) or create a new one
        OLD=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
          --jq "[.[] | select(.body | contains(\"$MARKER\"))][0].id" 2>/dev/null || true)
        if [ -n "$OLD" ] && [ "$OLD" != "null" ]; then
          gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$OLD" -F body=@/tmp/comment.md
        else
          gh pr comment "$PR" --body-file /tmp/comment.md
        fi

        # Add "blocked" label on failure, remove it on success
        if [ "$FAILED" = "true" ]; then
          gh label create blocked --color D93F0B 2>/dev/null || true
          gh pr edit "$PR" --add-label blocked
        else
          gh pr edit "$PR" --remove-label blocked 2>/dev/null || true
        fi
