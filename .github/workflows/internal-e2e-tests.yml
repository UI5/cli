name: Internal E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Internal E2E Tests
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22.20.0

    - name: Install dependencies
      run: npm ci

    - name: Run e2e-tests
      working-directory: internal/e2e-tests
      run: npm run test
