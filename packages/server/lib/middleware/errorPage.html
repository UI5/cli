<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{title}</title>
	<style>
		:root {
			color-scheme: dark;
			--fire: #FF5A37;
			--fire-secondary: #FFA42C;
			--bg: #000000;
			--surface: #0e0e0e;
			--surface-alt: #161616;
			--fg: #f5f5f5;
			--fg-muted: #9a9a9a;
			--border: #262626;
		}
		* { box-sizing: border-box; }
		html, body { margin: 0; padding: 0; }
		body {
			font-family: "72", Arial, Helvetica, sans-serif;
			color: var(--fg);
			background: var(--bg);
			line-height: 1.5;
			min-height: 100vh;
			display: flex;
			align-items: flex-start;
			justify-content: center;
			padding: 3rem 1.5rem;
		}
		.overlay {
			width: 100%;
			max-width: 920px;
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 12px;
			overflow: hidden;
			box-shadow: 0 24px 60px -20px rgba(0, 0, 0, 0.9);
		}
		.overlay-top {
			height: 4px;
			background: linear-gradient(90deg, var(--fire) 0%, var(--fire-secondary) 100%);
		}
		header {
			padding: 1.75rem 2rem 1.25rem;
			border-bottom: 1px solid var(--border);
		}
		.badge {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			font-size: 1rem;
			font-weight: 600;
			letter-spacing: 0.08em;
			color: var(--fire);
		}
		header h1 {
			margin: 0.75rem 0 0;
			font-size: 1.5rem;
			font-weight: 700;
			letter-spacing: -0.01em;
			color: var(--fg);
		}
		main {
			padding: 1.5rem 2rem 2rem;
		}
		.message {
			font-size: 1rem;
			margin: 0 0 1.5rem 0;
			color: var(--fire-secondary);
			word-wrap: break-word;
		}
		.stack-label {
			font-size: 1rem;
			font-weight: 600;
			letter-spacing: 0.08em;
			margin-bottom: 0.5rem;
		}
		.stack {
			background: var(--surface-alt);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 1rem 1.25rem;
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
			font-size: 0.85rem;
			line-height: 1.6;
			overflow-x: auto;
			color: var(--fg-muted);
			white-space: pre-wrap;
			word-wrap: break-word;
		}
		.hint {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			margin: 1.5rem 0 0;
			font-size: 0.85rem;
			color: var(--fg-muted);
		}
	</style>
	{liveReloadScript}
</head>
<body>
	<div class="overlay">
		<div class="overlay-top"></div>
		<header>
			<span class="badge">UI5 CLI Error</span>
			<h1>{title}</h1>
		</header>
		<main>
			<p class="message">{message}</p>
			<div class="stack-label">Stack Trace</div>
			<pre class="stack">{stack}</pre>
			<p class="hint">{hint}</p>
		</main>
	</div>
</body>
</html>
