name: GitHub CI

on:
  push:
    branches:
      - v4
  pull_request:
    branches:
      - v4

# No permissions are required for this workflow
permissions: {}

jobs:
  test:
    name: General checks, tests and coverage reporting
    runs-on: ubuntu-24.04
    steps:

    - uses: actions/checkout@v5

    - name: Use Node.js LTS 20.11.0
      uses: actions/setup-node@v5.0.0
      with:
        node-version: 20.11.0

    - name: Install dependencies
      run: npm ci

    - name: Perform checks and tests
      run: npm test

    - name: Send report to Coveralls
      uses: coverallsapp/github-action@v2.3.6
      with:
        # Pinned to v0.6.15 as workaround for 500 server errors
        # See: https://github.com/coverallsapp/coverage-reporter/issues/180
        coverage-reporter-version: v0.6.15
