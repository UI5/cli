# Cache Options — Warm Cache Benchmark
#
# Measures build time with cache already populated (no source changes).
# Benchmarks: metadata deserialization (JSON.parse / unpack), file reads,
# cache validation, and overall build performance with a cache hit.
# 
# The warmup runs (2) populate the cache. The measured runs (5) then exercise
# cache reads and validation. Each option uses a unique CACHE_VERSION, so
# caches from different revisions do not collide.
#
# Important: No `prepare` command is used. The warmup is responsible for
# seeding the cache. If stale cache from a prior run exists, the warmup
# overwrites it.
#
# Usage:
#   node internal/benchmark/cli.js run \
#     internal/benchmark/config/cache-options-warm.yaml \
#     /Users/i326076/SAPDevelop/openui5-sample-app \
#     /Users/i326076/SAPDevelop/openui5/src/sap.ui.core \
#     /Users/i326076/SAPDevelop/openui5/src/sap.m

revisions:
  baseline:
    name: "Baseline (pretty JSON)"
    revision: "feat/incremental-build-4"
  option_a:
    name: "Option A (minified JSON)"
    revision: "feat/cache-option-a"
  option_b:
    name: "Option B (MessagePack)"
    revision: "feat/cache-option-b"
  option_c:
    name: "Option C (SQLite+JSON)"
    revision: "feat/cache-option-c"
  option_d:
    name: "Option D (SQLite+MsgPack)"
    revision: "feat/cache-option-d"
  option_e:
    name: "Option E (LevelDB+MsgPack)"
    revision: "feat/cache-option-e"

hyperfine:
  warmup: 2
  runs: 5

groups:
  warm_build:
    name: "Warm Cache Build"

benchmarks:
  - command: "build"
    groups:
      warm_build:
        name: "build (warm cache)"
